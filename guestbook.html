<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - 我的博客</title>
    <meta name="description" content="欢迎留言交流">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <a href="#content" class="skip-link">跳到内容</a>
    
    <header class="site-header">
        <div class="container">
                <div class="site-branding">
                <h1 class="site-title"><a href="index.html">新原野</a></h1>
                <p class="site-description">一片新的原野，一个充满思考与探索的博客</p>
            </div>
            <nav class="main-navigation">
                <button class="menu-toggle" aria-label="菜单" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-menu">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="posts.html">文章列表</a></li>
                    <li class="current-menu-item"><a href="guestbook.html">留言板</a></li>
                    <li><a href="about.html">关于</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-content">
        <div class="container">
            <div class="content-area">
                <header class="page-header">
                    <h1 class="page-title">留言板</h1>
                </header>

                <div class="page-content">
                    <section class="about-section">
                        <p>欢迎留下你的想法、建议或任何问题！由于这是静态网站，留言功能通过第三方服务实现。你也可以通过邮件直接联系我。</p>
                    </section>

                    <!-- 使用 Utterances 作为评论系统（基于 GitHub Issues，免费） -->
                    <section class="guestbook-section">
                        <h2>发表评论</h2>
                        <p>请使用 GitHub 账号登录后留言：</p>
                        
                        <!-- Utterances 评论框 -->
                        <script src="https://utteranc.es/client.js"
                            repo="djm564331381-png/my-blog"
                            issue-term="pathname"
                            theme="github-light"
                            crossorigin="anonymous"
                            async>
                        </script>
                    </section>

                    <!-- 备用：简单的留言表单（需要配合后端或第三方表单服务） -->
                    <section class="guestbook-form-section" style="display: none;">
                        <h2>给我留言</h2>
                        <form class="guestbook-form" id="guestbook-form">
                            <div class="form-group">
                                <label for="guest-name">昵称 *</label>
                                <input type="text" id="guest-name" name="name" required placeholder="请输入你的昵称">
                            </div>
                            <div class="form-group">
                                <label for="guest-email">邮箱</label>
                                <input type="email" id="guest-email" name="email" placeholder="请输入你的邮箱（不会公开）">
                            </div>
                            <div class="form-group">
                                <label for="guest-content">留言内容 *</label>
                                <textarea id="guest-content" name="content" required placeholder="写下你想说的话..."></textarea>
                            </div>
                            <button type="submit" class="submit-btn">提交留言</button>
                        </form>
                    </section>
                </div>
            </div>

            <aside class="widget-area">
                <div class="widget widget-search">
                    <h3 class="widget-title">搜索</h3>
                    <form class="search-form" id="search-form">
                        <input type="search" class="search-field" placeholder="搜索文章..." id="search-input">
                        <button type="submit" class="search-submit">搜索</button>
                    </form>
                </div>

                <div class="widget widget-categories">
                    <h3 class="widget-title">分类</h3>
                    <ul class="category-list" id="category-list">
                        <!-- 分类列表将通过 JavaScript 动态加载 -->
                    </ul>
                </div>

                <div class="widget widget-recent">
                    <h3 class="widget-title">近期文章</h3>
                    <ul class="recent-posts" id="recent-posts">
                        <!-- 近期文章将通过 JavaScript 动态加载 -->
                    </ul>
                </div>
            </aside>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 我的博客. 保留所有权利.</p>
            <p class="footer-info">使用 GitHub Pages 搭建</p>
        </div>
    </footer>

    <button class="back-to-top" id="back-to-top" aria-label="返回顶部">↑</button>

    <script src="assets/js/main.js"></script>
</body>
</html>
